# =============================================================================
# APPLICATION IDENTITY
# =============================================================================
# Logical name of this Spring Boot application.
# Used in:
#   - Spring Boot Actuator health/info endpoints
#   - Distributed tracing (trace headers carry this name)
#   - Log correlation (auto-added to MDC when using Micrometer Tracing)
# Analogy: equivalent to <display-name> in your EFFORT-Web web.xml
spring.application.name=ai-mcp-lab

# =============================================================================
# EMBEDDED SERVER
# =============================================================================
# Port the embedded Tomcat listens on.
# In EFFORT-Web you set the port in Tomcat's server.xml (<Connector port="8080">).
# Here Tomcat is *inside* the JAR — configure it via this property instead.
# Override at runtime without changing this file:
#   java -jar ai-mcp-lab.jar --server.port=9090
#   or set env var:  SERVER_PORT=9090
server.port=8080

# =============================================================================
# DATASOURCE — MySQL
# =============================================================================
# Spring Boot's DataSourceAutoConfiguration reads these properties and wires a
# HikariCP DataSource + JdbcTemplate bean automatically.
#
# In EFFORT-Web you had XML like this in a *-constants.xml file:
#   <bean id="dataSource" class="com.zaxxer.hikari.HikariDataSource">
#       <property name="jdbcUrl"   value="${db.url}"/>
#       <property name="username"  value="${db.username}"/>
#       <property name="password"  value="${db.password}"/>
#   </bean>
# None of that XML is needed here — Boot does it from these three lines.

# Full JDBC URL.
# Format:  jdbc:mysql://<host>:<port>/<database>?<options>
#   serverTimezone=UTC        — required by mysql-connector-j 8.x; avoids timezone warnings
#   useSSL=false              — disable SSL for local dev (enable in production)
#   allowPublicKeyRetrieval=true — needed when useSSL=false with caching_sha2_password auth
spring.datasource.url=jdbc:mysql://localhost:3306/ai_mcp_lab?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true

# MySQL user dedicated to this application.
# Production rule: never use 'root'. Grant only SELECT/INSERT/UPDATE/DELETE on ai_mcp_lab.
# SQL to create:
#   CREATE USER 'mcp_user'@'localhost' IDENTIFIED BY 'your_password_here';
#   GRANT SELECT, INSERT, UPDATE, DELETE ON ai_mcp_lab.* TO 'mcp_user'@'localhost';
#   FLUSH PRIVILEGES;
spring.datasource.username=root

# TODO production: replace with ${MYSQL_PASSWORD} from environment, never commit real passwords to git
spring.datasource.password=Pin@801698

# Fully-qualified JDBC driver class.
# Spring Boot can auto-detect this from the URL prefix (jdbc:mysql → MySQL driver),
# but declaring it explicitly avoids any ambiguity and makes the intent clear.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# SQL INITIALISATION — schema.sql + data.sql
# =============================================================================
# Spring Boot's SqlInitializationAutoConfiguration reads these three properties
# and runs the specified SQL files against the DataSource on every startup.
#
# Execution order is always:  schema-locations first → data-locations second.
# This guarantees tables exist before rows are inserted.
#
# LEARNING NOTE — In Spring MVC (EFFORT-Web) you ran DDL/DML manually:
#   mysql -u root -p ai_mcp_lab < schema.sql
#   mysql -u root -p ai_mcp_lab < data.sql
# Here Spring Boot does both steps automatically every time the app starts.

# Controls WHEN the SQL init scripts are executed.
#
#   always   — run on every startup, for ANY datasource (MySQL, PostgreSQL, etc.)
#              Wipes and re-seeds the DB on every JVM restart (DROP TABLE in schema.sql).
#              Use only in CI or throwaway local environments.
#
#   embedded — run only for embedded in-memory databases (H2, HSQLDB, Derby).
#              This is the DEFAULT. It does nothing for MySQL.
#
#   never    — disable SQL init entirely. Spring Boot skips schema.sql and data.sql.
#              Manually-inserted rows survive across restarts. Use this for ongoing
#              development and live-data testing where you want the DB to persist.
#
# Set to "never" so data persists across restarts during development.
# To re-seed from scratch manually:
#   mysql -u root -p ai_mcp_lab < src/main/resources/schema.sql
#   mysql -u root -p ai_mcp_lab < src/main/resources/data.sql
spring.sql.init.mode=never

# Path to the DDL script (CREATE TABLE, DROP TABLE, ALTER TABLE).
# "classpath:" prefix = look in src/main/resources/ (included in the JAR).
# Spring Boot runs this file FIRST, before data-locations.
spring.sql.init.schema-locations=classpath:schema.sql

# Path to the DML seed-data script (INSERT INTO).
# Spring Boot runs this file SECOND, after schema-locations completes.
# Plain INSERT INTO is safe here because schema.sql drops and recreates
# all tables first — the tables are always empty when this runs.
spring.sql.init.data-locations=classpath:data.sql

# =============================================================================
# HIKARICP CONNECTION POOL (optional tuning — Boot defaults are sensible)
# =============================================================================
# Maximum number of connections in the pool.
# Rule of thumb for a dev/lab environment: 5-10.
# For production scale this up based on DB server capacity and expected concurrency.
spring.datasource.hikari.maximum-pool-size=10

# Time (ms) a request waits for a connection before throwing an exception.
# 30 seconds is generous for dev; tighten to ~5000ms in production.
spring.datasource.hikari.connection-timeout=30000

# =============================================================================
# LOGGING
# =============================================================================
# Root log level. Change to DEBUG temporarily to see auto-configuration decisions.
# Analogy: equivalent to <Root level="INFO"> in your log4j2.properties
logging.level.root=INFO

# Application-level logging — com.mcplab classes use @Slf4j log.info/warn/error.
logging.level.com.mcplab=INFO

# JdbcTemplate query logging — set to DEBUG during active SQL debugging; INFO for normal dev.
logging.level.org.springframework.jdbc.core=INFO

# Spring web request/response logging — uncomment to debug HTTP traffic.
# logging.level.org.springframework.web=DEBUG

# =============================================================================
# LOG FILE DESTINATION (LOGGING_GENERAL_GUIDELINES standard)
# Both console and file outputs are active simultaneously.
# Console: real-time dev feedback | File: persistent audit trail and grep target.
# =============================================================================
logging.file.name=/home/deva/Desktop/logs/ai-logs/ai-mcp-lab.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%5p] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%5p] %logger{36} - %msg%n
