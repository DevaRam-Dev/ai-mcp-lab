# =========================================================================
# MCP STDIO PROFILE
# =========================================================================
# Activated when running the JAR for MCP stdio mode:
#   java -jar target/ai-mcp-lab-0.0.1-SNAPSHOT.jar --spring.profiles.active=mcp
#
# Or set as environment variable:
#   SPRING_PROFILES_ACTIVE=mcp java -jar target/ai-mcp-lab-0.0.1-SNAPSHOT.jar
#
# Disables embedded Tomcat — the JVM becomes a quiet stdio process suitable
# for MCP Inspector / Claude Desktop / Cursor MCP integration.
# =========================================================================

# Disable embedded web server (Tomcat). Spring still creates beans, scans
# components, connects to MySQL — it just doesn't open a port.
spring.main.web-application-type=none

# Silence banner & startup logs to keep stdout clean for JSON-RPC framing.
# stdout is the MCP transport channel — anything written there must be JSON-RPC.
spring.main.banner-mode=off
logging.pattern.console=
logging.level.root=WARN
logging.level.com.mcplab=INFO

# Logging still works — it goes to STDERR, not STDOUT, so it won't break
# the MCP protocol. Inspector shows STDERR in the "Error output" panel.

# Show raw MCP wire messages on stderr while in MCP profile.
# Controls the @Slf4j logger on LoggingStdioTransportProvider (lifecycle messages).
# NOTE: the >>> MCP IN / <<< MCP OUT wire lines are written directly via
# System.err.println() — they always appear regardless of this level setting.
# The Spring console appender writes to stdout, so SLF4J is bypassed for wire
# messages to guarantee they never touch the MCP transport channel.
logging.level.com.mcplab.server.LoggingStdioTransportProvider=DEBUG
