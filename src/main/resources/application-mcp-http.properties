# =========================================================================
# MCP HTTP/SSE PROFILE
# =========================================================================
# Activated when running the JAR for HTTP/SSE MCP mode:
#   java -jar target/ai-mcp-lab-0.0.1-SNAPSHOT.jar --spring.profiles.active=mcp-http
#
# WHAT THIS FILE DOES
# -------------------
# Spring Boot merges this file ON TOP OF application.properties at startup.
# Everything already defined there (datasource URL, HikariCP, server.port,
# SQL init scripts, etc.) is inherited unchanged — this file only adds or
# overrides the properties that are different for HTTP/SSE mode.
#
# WHAT STAYS THE SAME AS DEFAULT MODE
# ------------------------------------
#   - Embedded Tomcat ON, port 8080  (inherited from application.properties)
#   - HikariCP pool connected to MySQL  (same datasource config)
#   - Spring banner visible (spring.main.banner-mode not overridden here)
#   - schema.sql + data.sql re-applied on startup  (spring.sql.init.mode=always)
#   - All @RestControllers active  (/api/employees, /api/departments, etc.)
#
# WHAT IS DIFFERENT FROM DEFAULT MODE
# ------------------------------------
#   - McpServerConfig.httpSseTransportProvider() bean is activated
#     (@Profile("mcp-http") gates it in McpServerConfig.java)
#   - McpServerConfig.mcpServletRegistration() bean registers the MCP servlet
#     at /sse (SSE stream) and /mcp/messages (JSON-RPC POST endpoint)
#   - SDK transport debug logging is enabled so you can see HTTP/SSE events
#
# WHAT IS DIFFERENT FROM THE STDIO MCP PROFILE (application-mcp.properties)
# --------------------------------------------------------------------------
#   mcp profile:      Tomcat OFF, stdin/stdout transport, banner suppressed
#   mcp-http profile: Tomcat ON,  HTTP/SSE transport,    banner visible
#   Both profiles:    Same MySQL connection, same tool beans, same 11 tools
#
# CONNECTING AI CLIENTS IN THIS MODE
# -----------------------------------
#   SSE stream  (server → AI client pushes):
#     curl -i http://localhost:8080/sse
#     → HTTP 200 + Content-Type: text/event-stream
#     → First event delivers the /mcp/messages endpoint URL to the client
#
#   JSON-RPC requests  (AI client → server):
#     POST http://localhost:8080/mcp/messages
#     Content-Type: application/json
#     Body: {"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}
#
#   Cursor / Claude Desktop mcp.json entry:
#     "ai-mcp-lab-http": { "url": "http://localhost:8080/sse" }
# =========================================================================

# -------------------------------------------------------------------------
# LOG LEVELS — HTTP/SSE mode
# -------------------------------------------------------------------------
# In HTTP/SSE mode stdout is safe for logging (the MCP transport runs over
# HTTP, not stdin/stdout). All levels can be set freely without protocol risk.
logging.level.root=INFO
logging.level.com.mcplab=INFO

# -------------------------------------------------------------------------
# TRANSPORT WIRE LOGGING
# -------------------------------------------------------------------------
# Enables DEBUG-level logs from the MCP SDK's HTTP/SSE transport layer.
# These log entries appear in the Spring console (stdout here, unlike stdio
# mode where stdout is the MCP channel — in HTTP mode stdout is safe to use
# because the transport runs over HTTP, not stdin/stdout).
#
# What you will see at DEBUG level:
#   - SSE client connect / disconnect events
#   - Each JSON-RPC message dispatched to a session
#   - Session close / cleanup lifecycle
#
# To silence: change DEBUG → INFO (or remove this line entirely).
logging.level.io.modelcontextprotocol=DEBUG

# Show SQL executed by JdbcTemplate — kept at DEBUG in HTTP mode so tool
# calls display the queries they run (visible in the console).
logging.level.org.springframework.jdbc.core=DEBUG

# Spring web request/response debug logging — uncomment to trace HTTP calls.
# logging.level.org.springframework.web=DEBUG
